dioxus-native = { path = "../dioxus/packages/native", default-features = false, features = ["net", "html", "vello"]}
# dioxus-native-dom = {path = "../dioxus/packages/native-dom"}
dioxus = {path = "../dioxus/packages/dioxus", default-features = false}
dioxus-signals = {path = "../dioxus/packages/signals"}
dioxus-hooks = {path = "../dioxus/packages/hooks"}
dioxus-core = {path = "../dioxus/packages/core"}
dioxus-html = {path = "../dioxus/packages/html"}
dioxus-core-macro = {path = "../dioxus/packages/core-macro"}
dioxus-devtools = {path = "../dioxus/packages/devtools"}
dioxus-document = {path = "../dioxus/packages/document"}
dioxus-asset-resolver = {path = "../dioxus/packages/asset-resolver"}
