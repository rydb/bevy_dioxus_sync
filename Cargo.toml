bevy_input = {version = "0.19"}
bevy_time = {version = "0.19"}
bevy_image = {version = "0.19"}
bevy_picking = {version = "0.19"}
bevy_derive = {version = "0.19"}
bevy_color = {version = "0.19"}
bevy_sprite = {version = "0.19"}
bevy_pbr = {version = "0.19"}
